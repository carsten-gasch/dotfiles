[main]
# Nutze eine klare Monospace- oder Pixel-Schriftart für den passenden Look
font=monospace:size=12
prompt="🌸 sakura: "
placeholder="Anwendung suchen..."
icon-theme=Adwaita
tabs=4

# Anordnung und Größe
width=40
lines=10
inner-pad=8
vertical-pad=12
horizontal-pad=12

# Scharfe Ecken passen perfekt zum Pixel-Art-Stil
border-width=2
radius=0

[colors]
# Hintergrund: Sehr helles, zartes Sakura-Rosa (passend zum GIF/Bild) mit voller Deckkraft
background=fceef2ff

# Standard-Text: Ein dunkles, gut lesbares Violett-Grau aus dem SDDM-Formular
text=4a3b4cff

# Platzhalter-Text: Etwas blasser
placeholder=a68fa6ff

# Suchtreffer (während des Tippens): Ein kräftigeres Kirschblüten-Pink
match=e05a88ff

# Ausgewählte Zeile (Hintergrund): Ein sanftes, helles Lavendel/Violett
selection=e5d4e7ff

# Text der ausgewählten Zeile: Bleibt dunkel für perfekten Kontrast
selection-text=332535ff

# Suchtreffer in der ausgewählten Zeile
selection-match=e05a88ff

# Rahmen: Das markante, dunklere Violett der SDDM-Eingabefelder
border=8b6b8eff

[border]
# Optionaler zusätzlicher Innenabstand für den Rahmen
width=2
radius=0
